<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>

body{
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
    background-image:url("https://images.unsplash.com/photo-1523580494863-6f3031224c94");
    background-size:cover;
}

/* Center form */
.container{
    width:350px;
    margin:120px auto;
    padding:25px;
    background:white;
    border-radius:10px;
}

/* Label styling */
label{
    display:block;
    margin-top:10px;
    font-weight:bold;
    text-transform:uppercase;
    font-size:14px;
}

/* Input styling */
input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:2px solid black;
    border-radius:6px;
}

/* Button styling */
button{
    width:100%;
    margin-top:15px;
    padding:10px;
    border:2px solid black;
    border-radius:8px;
    font-weight:bold;
    background-color:lightblue;
}

/* Hover effect */
button:hover{
    background-color:orange;
    cursor:pointer;
}

</style>
</head>
<body>

<div class="container">

<h2 style="text-align:center; text-decoration:underline;">Student Registration</h2>

<form action="table.html">

<label>Full Name</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Password</label>
<input type="password" required>

<label>Confirm Password</label>
<input type="password" required>

<label>Age</label>
<input type="number" required>

<label>Course</label>
<select>
<option>B.Tech</option>
<option>BCA</option>
<option>BSc</option>
<option>MCA</option>
</select>

<button type="submit">Register</button>

</form>

</div>

</body>
</html>
