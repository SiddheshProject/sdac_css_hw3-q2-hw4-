    <style>

body{
    margin:40px;
    padding:20px;
    font-family: Arial, Helvetica, sans-serif;
    background-color: chocolate;
}

h1{
    text-align:center;
    font-weight:bold;
    font-size:36px;
    font-style:italic;
    text-decoration: underline;
    text-transform: uppercase;
}

table{
    width:70%;
    margin:auto;
    border:3px solid black;
    border-collapse:collapse;
}

th{
    background-color: red;
    border:2px solid black;
    padding:10px;
    font-weight:bold;
    font-size:18px;
    text-transform:uppercase;
    text-decoration:underline;
}

td{
    border:2px solid black;
    padding:10px;
    text-align:center;
}

tr:nth-child(even){
    border-radius:10px;
    background-color:#83df7d;
}

tr:nth-child(odd){
    background-color: aqua;
    border-radius:10px;
}

tr:hover{
    font-style:italic;
    text-decoration:underline;
    background-color:yellow;
}

h1:hover{
    font-style:normal;
    text-decoration:overline;
    background-color: lavender;
}

</style>
</head>
